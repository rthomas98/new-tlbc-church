<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>About True Light Baptist Church</title>
<meta name="description" content="Built on the Word, grown by the Spirit. A historic Baptist church in Baton Rouge since 1941."/>
<link rel="stylesheet" href="styles.css"/>
<meta name="ext-resource-dependency" content="assets/logo-red-on-cream.png" data-resource-id="logoRedOnCream"/>
<meta name="ext-resource-dependency" content="assets/logo-white-transparent.png" data-resource-id="logoWhiteTransparent"/>
<template id="__bundler_thumbnail" data-bg-color="#A02319">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#A02319"/>
    <g fill="#F4F1EC" transform="translate(100 100)">
      <path d="M-32 -52 L32 -52 L18 0 L32 52 L-32 52 L-18 0 Z" opacity="0.95"/>
      <path d="M-14 -28 L14 -28 L6 0 L14 28 L-14 28 L-6 0 Z" fill="#A02319"/>
    </g>
  </svg>
</template>
<script>
(function(){
  const swap = () => {
    if (!window.__resources) return;
    document.querySelectorAll('img').forEach(img => {
      const s = img.getAttribute('src') || '';
      if (s.endsWith('logo-red-on-cream.png') && window.__resources.logoRedOnCream) img.src = window.__resources.logoRedOnCream;
      else if (s.endsWith('logo-white-transparent.png') && window.__resources.logoWhiteTransparent) img.src = window.__resources.logoWhiteTransparent;
    });
  };
  new MutationObserver(swap).observe(document.documentElement, {childList:true, subtree:true});
  setInterval(swap, 400);
})();
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="placeholders.jsx"></script>
<script type="text/babel" src="chrome-hero.jsx"></script>
<script type="text/babel" src="content.jsx"></script>
<script type="text/babel" src="engage.jsx"></script>
<script type="text/babel" src="subpage.jsx"></script>

<script type="text/babel">
const { useEffect } = React;
function App() {
  useEffect(() => {
    const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
    return () => clearTimeout(t);
  });
  const Page = window.SUBPAGES['about'];
  return (
    <React.Fragment>
      <Header active="about"/>
      <main><Page/></main>
      <Footer/>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

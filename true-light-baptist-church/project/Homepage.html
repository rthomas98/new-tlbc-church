<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>True Light Baptist Church · Baton Rouge</title>
<meta name="description" content="A Baptist church in Baton Rouge, sharing the light of Christ since 1941. Sundays at 10 a.m."/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="placeholders.jsx"></script>
<script type="text/babel" src="chrome-hero.jsx"></script>
<script type="text/babel" src="content.jsx"></script>
<script type="text/babel" src="engage.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [active, setActive] = useState('home');

  useEffect(() => {
    const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
    return () => clearTimeout(t);
  });

  return (
    <React.Fragment>
      <Header active={active} onNav={setActive}/>
      <main>
        <Hero onNav={setActive}/>
        <Marquee/>
        <Pastor onNav={setActive}/>
        <Services onNav={setActive}/>
        <Sermon onNav={setActive}/>
        <Ministries onNav={setActive}/>
        <Events onNav={setActive}/>
        <PrayerGive onNav={setActive}/>
        <Testimonials/>
      </main>
      <Footer onNav={setActive}/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
